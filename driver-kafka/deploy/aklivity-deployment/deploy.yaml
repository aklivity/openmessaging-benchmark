- name: Format and mount disks for Kafka and Controller hosts
  hosts: kafka,controller
  tags: restart_kafka
  connection: ssh
  become: true
  tasks:
    # TUNED-ADM FOR RHEL
    # - command: >
    #     tuned-adm profile latency-performance
    # Unmount disks for changing from ext4 <=> xfs
    # - name: Unmount disks
    #   mount:
    #     path: "{{ item.path }}"
    #     src: "{{ item.src }}"
    #     state: unmounted
    #   with_items:
    #     - { path: "/mnt/data-1", src: "/dev/nvme1n1" }
    - name: Format disks
      filesystem:
        fstype: xfs
        dev: '{{ item }}'
      with_items:
        - '/dev/nvme1n1'
    - name: Mount disks
      mount:
        path: "{{ item.path }}"
        src: "{{ item.src }}"
        fstype: xfs
        opts: defaults,noatime,nodiscard
        state: mounted
      with_items:
        - { path: "/mnt/data-1", src: "/dev/nvme1n1" }
    - name: Make sure there's no pre-existing logs directory
      file: path=/mnt/data-1/logs state=absent
    - name: Increase hard file descriptor limit
      pam_limits:
        domain: '*'
        limit_type: 'hard'
        limit_item: nofile
        value: 500000
    - name: Increase soft file descriptor limit
      pam_limits:
        domain: '*'
        limit_type: 'soft'
        limit_item: nofile
        value: 500000
    - name: Enable pam_limits.so
      lineinfile:
        path: /etc/pam.d/login
        insertafter: EOF
        line: 'session required pam_limits.so'
    - name: set vm.max_map_count
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes
    - name: Reboot the machine with all defaults
      reboot:

- name: Kafka internal DNS setup
  hosts: all
  connection: ssh
  tags: configure, clients, kafka, controller
  become: true
  tasks:
    - name: Debug /etc/hosts entry for Kafka brokers
      debug:
        msg: "{{ hostvars[item]['private_ip'] }} kafka-{{ loop_index + 1000 }}.internal.net"
      loop: "{{ groups['kafka'] }}"
      loop_control:
        index_var: loop_index
    - name: Add /etc/hosts entries for Kafka brokers
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item]['private_ip'] }} kafka-{{ loop_index + 1000 }}.internal.net"
        create: yes
      loop: "{{ groups['kafka'] }}"
      loop_control:
        index_var: loop_index

- name: Kafka and Controller setup
  hosts: all:!zilla
  connection: ssh
  tags: configure, clients, kafka, controller
  become: true
  vars:
    jdkArch:
      aarch64: aarch64
      x86_64: x64
  tasks:
    - name: Remove sysstat
      yum: pkg={{ item }} state=absent
      with_items:
        - sysstat
    - name: Install RPM packages
      yum: pkg={{ item }} state=latest
      with_items:
          - wget
          - sysstat
          - vim
          - chrony
          - git
          - gcc
          - make
    - name: Install OpenJDK 17 on Amazon Linux 2023
      dnf:
        name: java-17-amazon-corretto
        state: present
    - name: Print All OS version and architecture
      debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}, Arch: {{ ansible_architecture }}"
    - file: path=/opt/kafka state=absent
    - file: path=/opt/kafka state=directory
    - set_fact:
        controllerQuorumVoters: []
    - set_fact:
        controllerQuorumVoters: "{{ controllerQuorumVoters + [ item_idx|string + '@' + item ]}}"
      loop: "{{ groups['controller'] | map('extract', hostvars, ['ansible_default_ipv4', 'address']) | map('regex_replace', '^(.*)$', '\\1:9091') }}"
      loop_control:
        index_var: item_idx
    - set_fact:
        controllerServers: "{{ groups['controller'] | map('extract', hostvars, ['ansible_default_ipv4', 'address']) | map('regex_replace', '^(.*)$', '\\1:9091') | join(',') }}"
        bootstrapServers: "{{ groups['kafka'] | map('extract', hostvars, ['private_ip']) | map('regex_replace', '^(.*)$', '\\1:9092') | join(',') }}"
        sslbootstrapServers: "{% set servers = [] %}{% for i in range(0, groups['kafka'] | length) %}{% set _ = servers.append('kafka-' + (i + 1000)|string + '.internal.net:9093') %}{% endfor %}{{ servers|join(',') }}"
        zillaBootstrapServers: "{% set servers = [] %}{% for i in range(0, groups['kafka'] | length) %}{% set _ = servers.append('kafka-' + (i + 1000)|string + '.external.net:9093') %}{% endfor %}{{ servers|join(',') }}"
#        ccloudBootstrapServer: "{{ lookup('ini', 'bootstrap.servers type=properties file=ccloud.properties') }}"
#        ccloudJaasConfig: "{{ lookup('ini', 'sasl.jaas.config type=properties file=ccloud.properties') }}"
        kafkaVersion: "3.6.0"
    - debug:
        msg:
          - "Controller servers:            {{ controllerServers }}"
          - "Controller Quorum Voters:      {{ controllerQuorumVoters | join(',') }}"
          - "Bootstrap servers:             PLAINTEXT://{{ bootstrapServers }}"
          - "SSL Bootstrap servers:         SSL://{{ sslbootstrapServers }}"
          - "Zilla Bootstrap servers (SSL): SSL://{{ zillaBootstrapServers }}"
#          - "CCloud Bootstrap servers:     {{ ccloudBootstrapServer }}"
#          - "CCloud JAAS config:           {{ ccloudJaasConfig }}"
    - name: Download Kafka tarball
      get_url:
        url: "http://archive.apache.org/dist/kafka/{{ kafkaVersion }}/kafka_2.13-{{ kafkaVersion }}.tgz"
        dest: "/tmp/kafka_2.13-{{ kafkaVersion }}.tgz"
    - name: Extract Kafka
      unarchive:
        src: "/tmp/kafka_2.13-{{ kafkaVersion }}.tgz"
        dest: "/opt/kafka"
        remote_src: yes
        extra_opts: [ "--strip-components=1" ]
#    - name: Download Kafka packages
#      unarchive:
#        src: "http://archive.apache.org/dist/kafka/{{ kafkaVersion }}/kafka_2.13-{{ kafkaVersion }}.tgz"
#        remote_src: yes
#        dest: /opt/kafka
#        extra_opts: ["--strip-components=1"]
#    - name: Download Kafka packages
#      unarchive:
#        src: "/tmp/kafka_2.13-7.5.0-0-ce.tgz"
#        dest: "/opt/kafka"
#        extra_opts: ["--strip-components=1"]
    - set_fact:
        privateIp: "{{ hostvars[inventory_hostname]['private_ip'] }}"
    - name: Change locale to en_US.utf-8
      shell: |
        echo 'LANG=en_US.utf-8
              LC_ALL=en_US.utf-8' > /etc/environment
    - name: Generate UUID
      shell: /opt/kafka/bin/kafka-storage.sh random-uuid
      register: kafka_uuid_output
      run_once: true
    - set_fact:
        kafkaUuid: "{{ kafka_uuid_output.stdout | trim }}"

- name: Setup Controller
  hosts: controller
  connection: ssh
  tags: configure, controller
  become: true
  tasks:
    - set_fact:
        nodeId: "{{ loop_index }}"
      loop: "{{ groups['controller'] }}"
      loop_control:
        index_var: loop_index
      when: inventory_hostname == item
    - name: Setup JMX for Prometheus
      copy:
        src: "monitoring/jmx_exporter/jmx_prometheus_javaagent-0.13.0.jar"
        dest: "/opt/kafka/jmx_prometheus_javaagent-0.13.0.jar"
    - name: Configure JMX for Prometheus (Kafka)
      template:
        src: "monitoring/jmx_exporter/metrics.yml"
        dest: "/opt/kafka/metrics.yml"
    - name: Copy keystore
      copy:
        src: "templates/internal/server/keys"
        dest: "/opt/kafka/config/kafka.server.keystore.jks"
    - name: Copy truststore
      copy:
        src: "templates/internal/server/trust"
        dest: "/opt/kafka/config/kafka.server.truststore.jks"
    - name: Set up controller
      template:
        src: "templates/controller.properties"
        dest: "/opt/kafka/config/controller.properties"
    - template:
        src: "templates/controller.service"
        dest: "/etc/systemd/system/controller.service"
    - systemd:
        state: restarted
        daemon_reload: yes
        name: "controller"
    - git:
        repo: "https://github.com/sysstat/sysstat"
        dest: "/opt/sysstat"
    - name: Compile and install sysstat from source
      shell: cd /opt/sysstat && ./configure && make -j `nproc` && sudo make install
    - name: Format Controller log.dirs
      shell: /opt/kafka/bin/kafka-storage.sh format -t {{ kafkaUuid }} --ignore-formatted -c /opt/kafka/config/controller.properties


